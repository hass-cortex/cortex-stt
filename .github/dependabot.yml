version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    # Wait N days after a release before opening a PR — avoid 0-day regressions
    cooldown:
      default-days: 7
      semver-major-days: 30
    groups:
      # All dev tooling (ruff, pyright, commitizen, pre-commit, setuptools, ...)
      # Minor/patch bumps only — majors get their own PR for manual review
      dev-deps:
        patterns: ["*"]
        exclude-patterns:
          - "pytest*"
          - "aioresponses"
          - "voluptuous"
        update-types: ["minor", "patch"]
      # Test dependencies
      test-deps:
        patterns:
          - "pytest*"
          - "aioresponses"
          - "voluptuous"
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]
