rules:
  # Bronze
  action-setup:
    status: exempt
    comment: |
      No custom services/actions registered.
  appropriate-polling: done
  brands:
    status: exempt
    comment: |
      Shipped as a HACS custom integration; brand assets are bundled
      locally in custom_components/cortex_stt/brand/. Not submitted to
      home-assistant/brands since this is not a core integration.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: |
      No custom services/actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: |
      No custom services/actions.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: |
      Connects to a user-configured server URL, not a discoverable device.
  discovery-update-info:
    status: exempt
    comment: |
      No network discovery.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: |
      Service integration, not a device integration.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: |
      Devices are created at setup based on server model inventory,
      not dynamically discovered at runtime.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: |
      No known user-repairable issues requiring repair flows.
  stale-devices: done

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing:
    status: exempt
    comment: |
      pyright standard mode enabled with reportMissingImports=none for
      untyped HA stubs. Full strict-typing requires homeassistant type
      stubs which are not available for custom integrations running
      outside HA.
