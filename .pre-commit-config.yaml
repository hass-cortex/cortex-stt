repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: debug-statements

  - repo: local
    hooks:
      - id: hassfest
        name: hassfest
        entry: docker run --rm -v ./custom_components:/github/workspace/custom_components ghcr.io/home-assistant/hassfest:latest
        language: system
        pass_filenames: false
        files: ^custom_components/
      - id: pyright
        name: pyright (type check)
        entry: uv run pyright
        language: system
        stages: [pre-push]
        pass_filenames: false
        types: [python]
      - id: pytest-unit
        name: pytest (unit tests)
        entry: uv run pytest tests/ -m "not integration" -q --tb=short
        language: system
        stages: [pre-push]
        pass_filenames: false
        types: [python]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.8.1
    hooks:
      - id: commitizen
        stages: [commit-msg]
